<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open URL</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="openurl.css" />
</head>
<body>
  <div class="container">
    <div class="login-card">
      <h1>Open URL</h1>
      <form id="urlForm" novalidate>
        <div class="field">
          <label for="url">Enter a URL</label>
          <input
            type="url"
            id="url"
            name="url"
            placeholder="https://example.com"
            autocomplete="url"
          />
          <span class="error" id="urlError"></span>
        </div>
        <button type="submit" class="btn">Open URL</button>
      </form>

      <ul class="history" id="history"></ul>
    </div>
  </div>
  <script src="openurl.js"></script>
</body>
</html>
